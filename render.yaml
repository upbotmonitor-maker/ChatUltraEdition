services:
  - type: web
    name: chatfire-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "10000"
      - key: BREVO_API_KEY
        sync: false

  - type: web
    name: chatfire-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/chatfire run build
    staticPublishPath: artifacts/chatfire/dist/public
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://chatultraedition.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
