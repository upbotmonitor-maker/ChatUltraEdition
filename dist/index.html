<!DOCTYPE html>
  <html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Kapatıldı</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        max-width: 520px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 28px;
        font-size: 32px;
      }
      .code {
        font-size: 13px;
        color: #666;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-weight: 500;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }
      .divider {
        width: 40px;
        height: 2px;
        background: #333;
        margin: 20px auto;
      }
      p {
        font-size: 15px;
        color: #888;
        line-height: 1.7;
        margin-bottom: 10px;
      }
      .notice {
        margin-top: 32px;
        padding: 16px 20px;
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        font-size: 13px;
        color: #555;
        line-height: 1.6;
      }
      .notice span {
        color: #888;
      }
      .footer {
        margin-top: 48px;
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">⚠️</div>
      <div class="code">Hizmet Durduruldu</div>
      <h1>Bu site kapatıldı.</h1>
      <div class="divider"></div>
      <p>Aradığınız hizmete şu anda ulaşılamıyor.</p>
      <p>Yeni site bağlantısı yakında paylaşılacaktır.</p>
      <div class="notice">
        <span>Bu sayfa geçici olarak hizmet dışıdır. Yeni adres için lütfen duyuruları takip edin.</span>
      </div>
      <div class="footer">chatultraedition.onrender.com</div>
    </div>
  </body>
  </html>
